<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouma - Fluid Particle Background</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
let width, height, dpr;
let scale = 1;
let mouse = { x: -9999, y: -9999, active: false, prevX: -9999, prevY: -9999, speed: 0 };

/* ===== Auto performance scaling ===== */
const VW = window.innerWidth;
const IS_MOBILE = VW < 768;
const IS_TABLET = VW >= 768 && VW < 1100;
const CORES = navigator.hardwareConcurrency || 4;
const IS_LOW_END = CORES <= 4;

let PARTICLE_COUNT, TARGET_FPS, ENABLE_CONNECTIONS, ENABLE_TRAILS;
if (IS_MOBILE) {
  PARTICLE_COUNT = 35; TARGET_FPS = 30;
  ENABLE_CONNECTIONS = false; ENABLE_TRAILS = false;
} else if (IS_TABLET || IS_LOW_END) {
  PARTICLE_COUNT = 60; TARGET_FPS = 45;
  ENABLE_CONNECTIONS = true; ENABLE_TRAILS = false;
} else {
  PARTICLE_COUNT = 90; TARGET_FPS = 60;
  ENABLE_CONNECTIONS = true; ENABLE_TRAILS = true;
}
const FRAME_INTERVAL = 1000 / TARGET_FPS;

function resize() {
  // Cap DPR to avoid expensive renders on retina
  dpr = Math.min(window.devicePixelRatio || 1, IS_MOBILE ? 1.25 : 1.5);
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const base = Math.min(width, height) / 1000;
  scale = IS_MOBILE ? base * 0.5 : base;
}

const PALETTE = [
  { r: 10, g: 25, b: 80 },
  { r: 15, g: 40, b: 120 },
  { r: 20, g: 60, b: 160 },
  { r: 30, g: 90, b: 200 },
  { r: 50, g: 120, b: 220 },
  { r: 80, g: 150, b: 240 },
  { r: 160, g: 190, b: 230 },
];

class FluidParticle {
  constructor() { this.reset(); }

  reset() {
    this.x = Math.random() * width;
    this.y = Math.random() * height;
    this.vx = (Math.random() - 0.5) * 0.3 * scale;
    this.vy = (Math.random() - 0.5) * 0.3 * scale;
    this.size = Math.random() * 4 + 1;
    this.baseSize = this.size;
    this.color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    this.alpha = Math.random() * 0.4 + 0.15;
    this.baseAlpha = this.alpha;
    this.noiseOffsetX = Math.random() * 1000;
    this.noiseOffsetY = Math.random() * 1000;
    this.noiseSpeed = Math.random() * 0.003 + 0.001;
    this.mouseInfluence = 0;
    this.trail = [];
    this.maxTrail = ENABLE_TRAILS ? (Math.floor(Math.random() * 6) + 3) : 0;
  }

  update(time) {
    if (ENABLE_TRAILS) {
      this.trail.push({ x: this.x, y: this.y });
      if (this.trail.length > this.maxTrail) this.trail.shift();
    }

    const nx = Math.sin(this.noiseOffsetX + time * this.noiseSpeed) *
               Math.cos(this.noiseOffsetY + time * this.noiseSpeed * 0.7);
    const ny = Math.cos(this.noiseOffsetX + time * this.noiseSpeed * 0.8) *
               Math.sin(this.noiseOffsetY + time * this.noiseSpeed * 0.6);

    this.vx += nx * 0.008 * scale;
    this.vy += ny * 0.008 * scale;

    if (mouse.active) {
      const dx = this.x - mouse.x;
      const dy = this.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const RANGE = 220;

      if (dist < RANGE) {
        const norm = 1 - dist / RANGE;
        this.mouseInfluence = Math.min(1, this.mouseInfluence + 0.1);

        const angle = Math.atan2(dy, dx);
        const swirlForce = norm * 0.06;
        const pushForce = norm * norm * 0.04;

        this.vx += (Math.cos(angle + Math.PI * 0.6) * swirlForce + dx / dist * pushForce) * scale;
        this.vy += (Math.sin(angle + Math.PI * 0.6) * swirlForce + dy / dist * pushForce) * scale;

        this.size = this.baseSize * (1 + norm * 2.2);
        this.alpha = Math.min(0.85, this.baseAlpha + norm * 0.5);
      } else {
        this.mouseInfluence = Math.max(0, this.mouseInfluence - 0.02);
        this.size += (this.baseSize - this.size) * 0.05;
        this.alpha += (this.baseAlpha - this.alpha) * 0.03;
      }
    } else {
      this.mouseInfluence = Math.max(0, this.mouseInfluence - 0.02);
      this.size += (this.baseSize - this.size) * 0.05;
      this.alpha += (this.baseAlpha - this.alpha) * 0.03;
    }

    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.99;
    this.vy *= 0.99;

    if (this.x < -30) this.x = width + 30;
    if (this.x > width + 30) this.x = -30;
    if (this.y < -30) this.y = height + 30;
    if (this.y > height + 30) this.y = -30;
  }

  draw() {
    const { r, g, b } = this.color;

    // Trail: only when mouse influencing (避けるべき重い描画は条件付き)
    if (ENABLE_TRAILS && this.trail.length > 1 && this.mouseInfluence > 0.1) {
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x, this.trail[0].y);
      for (let i = 1; i < this.trail.length; i++) {
        ctx.lineTo(this.trail[i].x, this.trail[i].y);
      }
      ctx.lineTo(this.x, this.y);
      ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${this.alpha * this.mouseInfluence * 0.4})`;
      ctx.lineWidth = this.size * 0.5;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // Glow: only render expensive radial gradient if particle is influenced or large
    if (this.mouseInfluence > 0.05 || this.size > 3) {
      const glowSize = this.size * (2.5 + this.mouseInfluence * 2.5);
      const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowSize);
      glow.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${this.alpha * 0.45})`);
      glow.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${this.alpha * 0.1})`);
      glow.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${this.alpha})`;
    ctx.fill();
  }
}

class InkSplatter {
  constructor(x, y) {
    this.particles = [];
    const count = 10 + Math.floor(Math.random() * 6);
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = (Math.random() * 4 + 1) * scale;
      const color = PALETTE[Math.floor(Math.random() * 5)];
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: Math.random() * 5 + 1.5,
        alpha: Math.random() * 0.5 + 0.2,
        color,
        life: 1,
        decay: Math.random() * 0.015 + 0.008,
      });
    }
  }
  update() {
    this.particles = this.particles.filter(p => {
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.96; p.vy *= 0.96;
      p.life -= p.decay; p.alpha *= 0.98;
      return p.life > 0;
    });
    return this.particles.length > 0;
  }
  draw() {
    this.particles.forEach(p => {
      const { r, g, b } = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${p.alpha * p.life})`;
      ctx.fill();
    });
  }
}

/* Connections: 隣接粒子のみ（空間ハッシュで高速化） */
function drawConnections(particles) {
  const CELL = 130;
  const grid = new Map();
  // bin particles into spatial grid
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const cx = (p.x / CELL) | 0;
    const cy = (p.y / CELL) | 0;
    const key = cx + ',' + cy;
    if (!grid.has(key)) grid.set(key, []);
    grid.get(key).push(p);
  }
  // iterate each particle, check neighbors in 3x3 cells
  for (let i = 0; i < particles.length; i++) {
    const a = particles[i];
    const cx = (a.x / CELL) | 0;
    const cy = (a.y / CELL) | 0;
    for (let ox = -1; ox <= 1; ox++) {
      for (let oy = -1; oy <= 1; oy++) {
        const cell = grid.get((cx + ox) + ',' + (cy + oy));
        if (!cell) continue;
        for (let j = 0; j < cell.length; j++) {
          const b = cell[j];
          if (b === a || particles.indexOf(b) <= i) continue;
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const distSq = dx * dx + dy * dy;
          if (distSq < 14400) { // 120^2
            const dist = Math.sqrt(distSq);
            const baseAlpha = (1 - dist / 120) * 0.08;
            const boost = (a.mouseInfluence + b.mouseInfluence) * 0.12;
            const alpha = baseAlpha + boost;
            if (alpha > 0.01) {
              const cr = (a.color.r + b.color.r) >> 1;
              const cg = (a.color.g + b.color.g) >> 1;
              const cb = (a.color.b + b.color.b) >> 1;
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
              ctx.strokeStyle = `rgba(${cr}, ${cg}, ${cb}, ${alpha})`;
              ctx.lineWidth = boost > 0.02 ? 1 : 0.4;
              ctx.stroke();
            }
          }
        }
      }
    }
  }
}

let particles = [];
let splatters = [];

function init() {
  resize();
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new FluidParticle());
  }
}

let time = 0;
let lastFrame = 0;
let isVisible = true;

/* IntersectionObserver: 画面外で停止 */
if ('IntersectionObserver' in window) {
  const obs = new IntersectionObserver(es => es.forEach(e => isVisible = e.isIntersecting), { threshold: 0.01 });
  obs.observe(canvas);
}
document.addEventListener('visibilitychange', () => { isVisible = !document.hidden; });

let connectionFrame = 0;
function animate(now) {
  requestAnimationFrame(animate);
  if (!isVisible) return;
  if (now && now - lastFrame < FRAME_INTERVAL) return;
  lastFrame = now || 0;
  time++;

  // Background gradient (cached every 30 frames to reduce cost)
  if (time % 30 === 1 || !window._bgCached) {
    window._bgCached = ctx.createRadialGradient(width * 0.3, height * 0.3, 0, width / 2, height / 2, Math.max(width, height) * 0.9);
    window._bgCached.addColorStop(0, '#fafbfe');
    window._bgCached.addColorStop(0.5, '#f5f7fc');
    window._bgCached.addColorStop(1, '#eef1f8');
  }
  ctx.fillStyle = window._bgCached;
  ctx.fillRect(0, 0, width, height);

  if (mouse.active) {
    const mdx = mouse.x - mouse.prevX;
    const mdy = mouse.y - mouse.prevY;
    mouse.speed = Math.sqrt(mdx * mdx + mdy * mdy);
    mouse.prevX = mouse.x;
    mouse.prevY = mouse.y;
  }

  splatters = splatters.filter(s => { const alive = s.update(); if (alive) s.draw(); return alive; });

  // Particle updates (every frame)
  particles.forEach(p => p.update(time));

  // Connections: only every 2 frames to halve cost
  connectionFrame++;
  if (ENABLE_CONNECTIONS && (connectionFrame & 1) === 0) {
    drawConnections(particles);
  }

  particles.forEach(p => p.draw());
}

window.addEventListener('resize', () => { resize(); });
window.addEventListener('mousemove', e => {
  mouse.prevX = mouse.x; mouse.prevY = mouse.y;
  mouse.x = e.clientX; mouse.y = e.clientY;
  mouse.active = true;
});
window.addEventListener('mouseleave', () => { mouse.active = false; mouse.x = -9999; mouse.y = -9999; mouse.speed = 0; });
window.addEventListener('click', e => { splatters.push(new InkSplatter(e.clientX, e.clientY)); });
window.addEventListener('touchmove', e => {
  mouse.prevX = mouse.x; mouse.prevY = mouse.y;
  mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY;
  mouse.active = true;
});
window.addEventListener('touchend', () => { mouse.active = false; mouse.x = -9999; mouse.y = -9999; mouse.speed = 0; });

window.addEventListener('message', e => {
  if (e.data && e.data.type === 'mousemove') {
    mouse.prevX = mouse.x; mouse.prevY = mouse.y;
    mouse.x = e.data.x; mouse.y = e.data.y;
    mouse.active = true;
  } else if (e.data && e.data.type === 'mouseleave') {
    mouse.active = false; mouse.x = -9999; mouse.y = -9999; mouse.speed = 0;
  } else if (e.data && e.data.type === 'click') {
    splatters.push(new InkSplatter(e.data.x, e.data.y));
  }
});

init();
requestAnimationFrame(animate);
</script>
</body>
</html>
