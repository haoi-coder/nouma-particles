<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouma - Fluid Particle Background</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #f8f9fc; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let width, height, dpr;
let mouse = { x: -9999, y: -9999, active: false, prevX: -9999, prevY: -9999, speed: 0 };

function resize() {
  dpr = window.devicePixelRatio || 1;
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  ctx.scale(dpr, dpr);
}

// Nouma brand palette - deep navy to cobalt blue
const PALETTE = [
  { r: 10, g: 25, b: 80 },    // deep navy
  { r: 15, g: 40, b: 120 },   // dark blue
  { r: 20, g: 60, b: 160 },   // navy blue
  { r: 30, g: 90, b: 200 },   // cobalt blue
  { r: 50, g: 120, b: 220 },  // bright blue
  { r: 80, g: 150, b: 240 },  // light cobalt
  { r: 200, g: 215, b: 235 }, // pale blue-grey (subtle)
];

// Fluid-like particles that flow organically
class FluidParticle {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * width;
    this.y = Math.random() * height;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.size = Math.random() * 3 + 0.5;
    this.baseSize = this.size;
    this.color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    this.alpha = Math.random() * 0.2 + 0.05;
    this.baseAlpha = this.alpha;
    this.life = 1;
    this.noiseOffsetX = Math.random() * 1000;
    this.noiseOffsetY = Math.random() * 1000;
    this.noiseSpeed = Math.random() * 0.003 + 0.001;
    this.mouseInfluence = 0;
    // Ink trail properties
    this.trail = [];
    this.maxTrail = Math.floor(Math.random() * 8) + 3;
  }

  update(time) {
    // Store trail
    this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
    if (this.trail.length > this.maxTrail) this.trail.shift();

    // Organic flow using simplex-like noise
    const nx = Math.sin(this.noiseOffsetX + time * this.noiseSpeed) *
               Math.cos(this.noiseOffsetY + time * this.noiseSpeed * 0.7);
    const ny = Math.cos(this.noiseOffsetX + time * this.noiseSpeed * 0.8) *
               Math.sin(this.noiseOffsetY + time * this.noiseSpeed * 0.6);

    this.vx += nx * 0.008;
    this.vy += ny * 0.008;

    // Mouse interaction - ink dispersion effect
    if (mouse.active) {
      const dx = this.x - mouse.x;
      const dy = this.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const RANGE = 250;

      if (dist < RANGE) {
        const norm = 1 - dist / RANGE;
        this.mouseInfluence = Math.min(1, this.mouseInfluence + 0.1);

        // Swirl effect - particles spiral around mouse
        const angle = Math.atan2(dy, dx);
        const swirlForce = norm * 0.06;
        const pushForce = norm * norm * 0.04;

        this.vx += Math.cos(angle + Math.PI * 0.6) * swirlForce + dx / dist * pushForce;
        this.vy += Math.sin(angle + Math.PI * 0.6) * swirlForce + dy / dist * pushForce;

        // Speed-based dispersion
        if (mouse.speed > 3 && dist < 100) {
          this.vx += (Math.random() - 0.5) * mouse.speed * 0.02;
          this.vy += (Math.random() - 0.5) * mouse.speed * 0.02;
        }

        this.size = this.baseSize * (1 + norm * 2);
        this.alpha = Math.min(0.6, this.baseAlpha + norm * 0.35);
      } else {
        this.mouseInfluence = Math.max(0, this.mouseInfluence - 0.02);
        this.size += (this.baseSize - this.size) * 0.05;
        this.alpha += (this.baseAlpha - this.alpha) * 0.03;
      }
    } else {
      this.mouseInfluence = Math.max(0, this.mouseInfluence - 0.02);
      this.size += (this.baseSize - this.size) * 0.05;
      this.alpha += (this.baseAlpha - this.alpha) * 0.03;
    }

    this.x += this.vx;
    this.y += this.vy;

    // Damping
    this.vx *= 0.99;
    this.vy *= 0.99;

    // Wrap
    if (this.x < -30) this.x = width + 30;
    if (this.x > width + 30) this.x = -30;
    if (this.y < -30) this.y = height + 30;
    if (this.y > height + 30) this.y = -30;
  }

  draw() {
    const { r, g, b } = this.color;

    // Draw trail (ink-like)
    if (this.trail.length > 1 && this.mouseInfluence > 0.05) {
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x, this.trail[0].y);
      for (let i = 1; i < this.trail.length; i++) {
        const t = this.trail[i];
        ctx.lineTo(t.x, t.y);
      }
      ctx.lineTo(this.x, this.y);
      ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${this.alpha * this.mouseInfluence * 0.3})`;
      ctx.lineWidth = this.size * 0.5;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // Soft glow
    const glowSize = this.size * (3 + this.mouseInfluence * 3);
    const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowSize);
    glow.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${this.alpha * 0.4})`);
    glow.addColorStop(0.4, `rgba(${r}, ${g}, ${b}, ${this.alpha * 0.1})`);
    glow.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${this.alpha})`;
    ctx.fill();
  }
}

// Ink splatter on click
class InkSplatter {
  constructor(x, y) {
    this.particles = [];
    const count = 15 + Math.floor(Math.random() * 10);
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 4 + 1;
      const color = PALETTE[Math.floor(Math.random() * 5)]; // darker colors only
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: Math.random() * 4 + 1,
        alpha: Math.random() * 0.3 + 0.15,
        color,
        life: 1,
        decay: Math.random() * 0.015 + 0.008,
      });
    }
  }

  update() {
    this.particles = this.particles.filter(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.96;
      p.vy *= 0.96;
      p.life -= p.decay;
      p.alpha *= 0.98;
      return p.life > 0;
    });
    return this.particles.length > 0;
  }

  draw() {
    this.particles.forEach(p => {
      const { r, g, b } = p.color;
      // Ink blob
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${p.alpha * p.life})`;
      ctx.fill();
      // Soft edge
      const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * p.life * 3);
      glow.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${p.alpha * p.life * 0.2})`);
      glow.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life * 3, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
    });
  }
}

// Fluid connections
function drawConnections(particles) {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const a = particles[i];
      const b = particles[j];
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 120) {
        const baseAlpha = (1 - dist / 120) * 0.04;
        const boost = (a.mouseInfluence + b.mouseInfluence) * 0.12;
        const alpha = baseAlpha + boost;

        if (alpha > 0.005) {
          const cr = Math.round((a.color.r + b.color.r) / 2);
          const cg = Math.round((a.color.g + b.color.g) / 2);
          const cb = Math.round((a.color.b + b.color.b) / 2);

          ctx.beginPath();
          // Curved connection for organic feel
          const midX = (a.x + b.x) / 2 + (Math.random() - 0.5) * 5;
          const midY = (a.y + b.y) / 2 + (Math.random() - 0.5) * 5;
          ctx.moveTo(a.x, a.y);
          ctx.quadraticCurveTo(midX, midY, b.x, b.y);
          ctx.strokeStyle = `rgba(${cr}, ${cg}, ${cb}, ${alpha})`;
          ctx.lineWidth = boost > 0.02 ? 0.8 : 0.3;
          ctx.stroke();
        }
      }
    }
  }
}

let particles = [];
let splatters = [];
const PARTICLE_COUNT = 120;

function init() {
  resize();
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new FluidParticle());
  }
}

let time = 0;
function animate() {
  time++;
  ctx.clearRect(0, 0, width, height);

  // Background matching Nouma site
  const bg = ctx.createRadialGradient(width * 0.3, height * 0.3, 0, width / 2, height / 2, Math.max(width, height) * 0.9);
  bg.addColorStop(0, '#fafbfe');
  bg.addColorStop(0.5, '#f5f7fc');
  bg.addColorStop(1, '#eef1f8');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, width, height);

  // Mouse area glow
  if (mouse.active) {
    const mg = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 280);
    mg.addColorStop(0, 'rgba(20, 60, 160, 0.03)');
    mg.addColorStop(0.5, 'rgba(30, 90, 200, 0.015)');
    mg.addColorStop(1, 'transparent');
    ctx.fillStyle = mg;
    ctx.fillRect(0, 0, width, height);
  }

  // Update mouse speed
  if (mouse.active) {
    const mdx = mouse.x - mouse.prevX;
    const mdy = mouse.y - mouse.prevY;
    mouse.speed = Math.sqrt(mdx * mdx + mdy * mdy);
    mouse.prevX = mouse.x;
    mouse.prevY = mouse.y;
  }

  // Splatters
  splatters = splatters.filter(s => { const alive = s.update(); if (alive) s.draw(); return alive; });

  particles.forEach(p => p.update(time));
  drawConnections(particles);
  particles.forEach(p => p.draw());

  requestAnimationFrame(animate);
}

window.addEventListener('resize', () => { resize(); });
window.addEventListener('mousemove', e => {
  mouse.prevX = mouse.x;
  mouse.prevY = mouse.y;
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});
window.addEventListener('mouseleave', () => {
  mouse.active = false;
  mouse.x = -9999;
  mouse.y = -9999;
  mouse.speed = 0;
});
window.addEventListener('click', e => {
  splatters.push(new InkSplatter(e.clientX, e.clientY));
});
window.addEventListener('touchmove', e => {
  mouse.prevX = mouse.x;
  mouse.prevY = mouse.y;
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
  mouse.active = true;
});
window.addEventListener('touchend', () => {
  mouse.active = false;
  mouse.x = -9999;
  mouse.y = -9999;
  mouse.speed = 0;
});

init();
animate();
</script>
</body>
</html>
