<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nouma — Phase Evolution</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:  #0B1F3A;
    --ink:   #1A2B44;
    --subt:  #6B7785;
    --hair:  #D9DEE6;
    --bg:    transparent;
    --tool:  #7A8FA8; /* secondary group (tools/AI) */
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: transparent !important;
    background-color: transparent !important;
    color: var(--ink);
    color-scheme: light;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  body {
    font-family: 'Noto Serif JP', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    font-weight: 400;
    line-height: 1.7;
    letter-spacing: 0.04em;
  }

  #ambient { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  #scene   { position: absolute; inset: 0; z-index: 1; pointer-events: none; width: 100%; height: 100%; display: block; }

  .frame {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    display: grid;
    grid-template-rows: auto minmax(160px, 1fr) auto auto auto;
    gap: clamp(4px, 0.6vh, 8px);
    padding: clamp(10px, 1.4vw, 18px) clamp(20px, 3vw, 48px) clamp(10px, 1.4vw, 16px);
    pointer-events: none;
  }
  .frame > * { pointer-events: auto; }

  header.brand {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; letter-spacing: 0.24em; color: var(--subt); text-transform: uppercase;
  }
  header.brand .b {
    color: var(--navy); font-weight: 600; letter-spacing: 0.06em;
    text-transform: none; font-size: 15px;
  }

  .lead {
    max-width: 1180px; margin: 0 auto; text-align: center;
    padding: 0 clamp(0px, 2vw, 32px);
  }
  .lead .eyebrow {
    font-size: 10px; letter-spacing: 0.40em; color: var(--subt); text-transform: uppercase;
    margin-bottom: 10px;
  }
  .lead h1 {
    margin: 0;
    font-size: clamp(16px, 1.6vw, 22px);
    font-weight: 600; color: var(--navy);
    letter-spacing: 0.05em; line-height: 1.5;
    text-align: center;
  }
  /* レスポンシブ改行制御 */
  .br-sm, .br-md { display: none; }
  @media (max-width: 768px) { .br-md { display: inline; } }
  @media (max-width: 480px) { .br-sm { display: inline; } }
  .lead p {
    margin: 0;
    font-size: clamp(11px, 0.95vw, 13px);
    color: var(--subt); letter-spacing: 0.08em; line-height: 1.8;
  }

  .chain {
    display: flex; align-items: center; justify-content: center;
    gap: clamp(14px, 2vw, 28px);
    font-family: 'Noto Serif JP', serif;
    font-size: 13px; color: var(--subt);
    flex-wrap: wrap;
  }
  .chain .bra {
    cursor: pointer;
    transition: color .35s, opacity .35s, letter-spacing .35s;
    opacity: .5;
    letter-spacing: 0.08em;
    padding: 4px 2px;
  }
  .chain .bra.active {
    color: var(--navy); opacity: 1; font-weight: 600; letter-spacing: 0.12em;
  }
  .chain .bra:hover { opacity: 1; color: var(--navy); }
  .chain .arrow {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px;
    border: 1px solid currentColor;
    border-radius: 50%;
    color: var(--subt);
    font-size: 16px; line-height: 1;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-weight: 600;
    opacity: 0.85;
    transform: translateY(-1px);
  }

  /* ② 粒子グラフィックの主役エリア（1fr で可変、最低限の高さ確保） */
  .stage-area {
    position: relative;
    min-height: 200px;
    overflow: hidden;
  }
  .phase-caption {
    font-size: 10px; letter-spacing: 0.28em; color: var(--subt);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 0;
    padding-top: 6px;
    border-top: 1px solid var(--hair);
  }
  .phase-caption b { color: var(--navy); font-weight: 600; }

  .stages {
    display: flex;
    align-items: stretch;
    justify-content: center;
    margin-top: 8px;
    gap: 8px;
  }
  .stages .stage { flex: 1 1 0; min-width: 0; }
  .stage-arrow {
    flex: 0 0 auto;
    align-self: center;
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px;
    border: 1px solid var(--subt);
    border-radius: 50%;
    color: var(--subt);
    font-size: 16px; line-height: 1;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-weight: 600;
    opacity: 0.7;
  }
  .stage {
    text-align: center; cursor: pointer; user-select: none;
    padding: 16px 12px;
    border: 1px solid var(--hair);
    border-radius: 4px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(6px);
    transition: all .3s;
    position: relative;
    min-height: 86px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .stage:hover {
    transform: translateY(-3px);
    border-color: var(--navy);
    box-shadow: 0 8px 24px rgba(11,31,58,0.12);
  }
  .stage.active {
    border-color: var(--navy);
    border-width: 2px;
    background: #fff;
    box-shadow: 0 4px 16px rgba(11,31,58,0.15);
  }
  .stage::after {
    content: '事業内容を見る ›';
    display: block;
    margin-top: 10px;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--subt);
    opacity: 0;
    transition: opacity .3s;
  }
  .stage:hover::after, .stage.active::after { opacity: 1; color: var(--navy); }
  .stage .num {
    font-size: 10px; letter-spacing: 0.32em; color: var(--subt); text-transform: uppercase;
    margin-bottom: 6px;
  }
  .stage .ket {
    font-family: 'Noto Serif JP', serif;
    font-size: 14px; color: var(--subt); margin-right: 6px;
    transition: color .35s;
  }
  .stage .name {
    font-size: clamp(15px, 1.25vw, 18px);
    font-weight: 600; color: var(--ink);
    letter-spacing: 0.04em;
    transition: color .35s;
  }
  .stage .ja {
    display: block;
    font-size: 13px; color: var(--subt);
    letter-spacing: 0.08em; margin-top: 5px;
  }
  .stage.active .ket,
  .stage.active .name { color: var(--navy); }

  .detail {
    display: block;
    padding-top: 4px;
    min-height: 0;
  }
  .detail-body { max-width: 820px; min-width: 0; margin: 0 auto; text-align: center; }
  .detail-title {
    font-size: clamp(17px, 1.55vw, 22px);
    font-weight: 600; color: var(--navy);
    letter-spacing: 0.04em; margin-bottom: 8px; line-height: 1.4;
  }
  .detail-text {
    font-size: clamp(15px, 1.25vw, 18px);
    color: var(--ink);
    letter-spacing: 0.05em; line-height: 1.85;
    margin: 0;
  }
  .detail-text .k {
    color: var(--navy); font-weight: 600;
    background: linear-gradient(transparent 70%, rgba(11,31,58,0.08) 70%);
    padding: 0 2px;
  }
  .fade-in { animation: fade .55s ease both; }
  @keyframes fade {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== Modal ===== */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(11,31,58,0.55);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: none;
    opacity: 0;
    transition: opacity .3s;
    padding: 0;
    overflow-y: auto;
  }
  .modal-backdrop.open { display: block; opacity: 1; }
  .modal {
    background: #fff;
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    margin: 0;
    padding: clamp(20px, 3vh, 36px) clamp(20px, 4vw, 56px);
    border-radius: 0;
    box-shadow: none;
    transform: translateY(20px);
    transition: transform .35s cubic-bezier(.2,.8,.2,1);
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow-y: auto;
    box-sizing: border-box;
    -webkit-overflow-scrolling: touch;
  }
  .modal-inner {
    max-width: 1240px;
    width: 100%;
    margin: 0 auto;
  }
  .modal-backdrop.open .modal { transform: translateY(0); }
  /* 中身が高さを超えたら上揃え（中央寄せだと切れる場合あり） */
  @media (max-height: 600px) {
    .modal { justify-content: flex-start; }
  }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    width: 36px; height: 36px;
    border: none; background: transparent;
    cursor: pointer;
    font-size: 22px; color: var(--subt);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, color .2s;
  }
  .modal-close:hover { background: rgba(11,31,58,0.05); color: var(--navy); }
  .modal-num {
    font-size: 11px; letter-spacing: 0.32em; color: var(--subt);
    text-transform: uppercase; margin-bottom: 12px;
  }
  .modal-title {
    font-size: clamp(22px, 2.2vw, 28px);
    font-weight: 700; color: var(--navy);
    margin-bottom: 4px; line-height: 1.3;
    letter-spacing: 0.02em;
  }
  .modal-title .num {
    color: var(--subt);
    font-weight: 400;
    margin-right: 14px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 0.85em;
    letter-spacing: 0.1em;
  }
  /* 下部閉じるボタン */
  .modal-actions {
    margin-top: 20px;
    display: flex;
    justify-content: center;
  }
  .modal-close-btn {
    appearance: none;
    background: var(--navy);
    color: #fff;
    border: none;
    padding: 10px 42px;
    font-size: 12px;
    letter-spacing: 0.14em;
    font-family: inherit;
    cursor: pointer;
    border-radius: 999px;
    transition: background .25s, transform .25s;
  }
  .modal-close-btn:hover {
    background: #001a3a;
    transform: translateY(-1px);
  }
  .modal-title-en {
    font-size: 13px; color: var(--subt);
    letter-spacing: 0.1em; margin-bottom: 20px;
  }
  .modal-section { margin-bottom: 20px; }
  .modal-section:last-child { margin-bottom: 0; }
  .modal-label {
    font-size: 12px;
    letter-spacing: 0.14em;
    color: var(--navy);
    font-weight: 600;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--navy);
    display: inline-block;
  }
  .modal-body {
    font-size: clamp(15px, 1.1vw, 17px);
    color: var(--ink); line-height: 1.9;
    letter-spacing: 0.04em;
  }
  .modal-body .k {
    color: var(--navy); font-weight: 600;
    background: linear-gradient(transparent 70%, rgba(11,31,58,0.08) 70%);
    padding: 0 2px;
  }

  /* よくある現状／よくある課題のフラットリスト */
  .flat-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .flat-list li {
    font-size: clamp(13px, 1vw, 15px);
    color: var(--ink);
    line-height: 1.55;
    padding: 6px 0 6px 20px;
    position: relative;
    letter-spacing: 0.03em;
  }
  .flat-list li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 14px;
    width: 12px;
    height: 1px;
    background: var(--navy);
  }
  .flat-list--challenge li::before {
    background: #c0392b;
    height: 2px;
    width: 12px;
  }
  .flat-list--challenge li {
    color: var(--ink);
    font-weight: 500;
  }
  /* ===== Two-column layout (50/50) ===== */
  .modal-cols {
    display: grid;
    grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
    gap: 32px;
    align-items: stretch;
  }
  .modal-main { min-width: 0; }
  .modal-side {
    display: flex;
    flex-direction: column;
    gap: 16px;
    justify-content: space-between;
  }
  .side-block .modal-label { margin-bottom: 10px; }

  .outcomes-list { list-style: none; padding: 0; margin: 0; }
  .outcomes-list li {
    padding: 10px 0;
    border-bottom: 1px solid var(--hair);
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .outcomes-list li:last-child { border-bottom: none; }
  .outcomes-list .o-metric {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--subt);
    text-transform: uppercase;
  }
  .outcomes-list .o-value {
    font-size: clamp(13px, 1vw, 15px);
    color: var(--navy);
    font-weight: 600;
    line-height: 1.5;
  }

  .usecase-list { list-style: none; padding: 0; margin: 0; }
  .usecase-list li {
    font-size: clamp(13px, 1vw, 15px);
    color: var(--ink);
    line-height: 1.7;
    padding: 10px 0 10px 22px;
    position: relative;
  }
  .usecase-list li::before {
    content: '';
    position: absolute; left: 0; top: 19px;
    width: 12px; height: 1px;
    background: var(--navy);
  }

  /* 概算見積もりパネル */
  .estimate-panel {
    background: rgba(11,31,58,0.04);
    border: 1px solid var(--hair);
    border-radius: 6px;
    padding: 16px 18px;
  }
  .estimate-hint {
    font-size: 12px;
    color: var(--subt);
    text-align: center;
    line-height: 1.7;
    padding: 12px 0;
    letter-spacing: 0.04em;
  }
  .estimate-result { display: block; }
  .est-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px solid var(--hair);
    gap: 12px;
  }
  .est-row:last-of-type { border-bottom: none; }
  .est-row--lead { border-top: 1px dashed var(--hair); margin-top: 4px; padding-top: 10px; }
  .est-label {
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--subt);
    flex-shrink: 0;
  }
  .est-value {
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    text-align: right;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }
  .est-note {
    font-size: 10px;
    color: var(--subt);
    margin-top: 10px;
    line-height: 1.5;
  }

  .side-cta {
    background: #0B1F3A;
    border-radius: 6px;
    padding: 18px 18px;
    text-align: center;
    color: #fff;
    margin-top: 4px;
  }
  .cta-text {
    font-size: 13px;
    line-height: 1.65;
    margin: 0 0 12px;
    color: #fff;
    letter-spacing: 0.04em;
    font-weight: 500;
  }
  .cta-btn {
    display: inline-block;
    background: #fff;
    color: var(--navy);
    padding: 10px 26px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-decoration: none;
    border-radius: 999px;
    transition: transform .25s, box-shadow .25s;
  }
  .cta-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.2);
  }

  /* ===== Support icon grid ===== */
  .modal-support-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px;
  }
  .sup-card {
    background: #0B1F3A;
    border: 1px solid #0B1F3A;
    border-radius: 4px;
    padding: 12px 12px;
    transition: transform .25s, box-shadow .25s, background .25s;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .sup-card:hover {
    transform: translateY(-2px);
    background: #14223A;
    box-shadow: 0 6px 18px rgba(11,31,58,0.25);
  }
  .sup-card.is-selected {
    background: #14223A;
    box-shadow: 0 0 0 2px #A8CDE5, 0 6px 18px rgba(11,31,58,0.3);
  }
  .sup-card.is-selected::after {
    content: '✓';
    position: absolute;
    top: 8px;
    right: 10px;
    width: 18px; height: 18px;
    background: #A8CDE5;
    color: #0B1F3A;
    font-size: 12px;
    font-weight: 700;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .sup-card { position: relative; }
  .sup-icon {
    width: 24px; height: 24px;
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.95;
    margin-bottom: 2px;
  }
  .sup-icon svg { width: 100%; height: 100%; }
  .sup-title {
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.03em;
    line-height: 1.4;
  }
  .sup-desc {
    font-size: 11px;
    color: rgba(255,255,255,0.72);
    line-height: 1.5;
    letter-spacing: 0.02em;
  }

  /* ===== Plan badge (top-right) ===== */
  .plan-badge {
    position: absolute;
    top: 28px; right: 72px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    border-radius: 999px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    z-index: 5;
    border: 1px solid var(--navy);
    background: #fff;
  }
  .plan-badge.is-free {
    background: var(--navy);
    color: #fff;
    border-color: var(--navy);
  }
  .plan-badge .plan-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--navy);
  }
  .plan-badge.is-free .plan-label { color: #fff; }
  .plan-badge .plan-sub {
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--subt);
    text-transform: uppercase;
    border-left: 1px solid var(--hair);
    padding-left: 10px;
  }
  .plan-badge.is-free .plan-sub {
    color: rgba(255,255,255,0.7);
    border-color: rgba(255,255,255,0.3);
  }

  footer.foot {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; letter-spacing: 0.22em; color: var(--subt); text-transform: uppercase;
  }
  footer.foot .right { letter-spacing: 0.06em; text-transform: none; font-size: 12px; }

  /* ===== タブレット ===== */
  @media (max-width: 960px) {
    html, body { overflow-y: auto; height: auto; }
    .frame {
      grid-template-rows: auto auto auto auto;
      height: auto; min-height: 100vh;
      padding: 24px 20px;
      gap: 20px;
    }
    .stages { gap: 4px; }
    .stage-arrow { width: 22px; height: 22px; font-size: 14px; }
    .detail { display: block; }
    .stage .name { font-size: 12px; }
    .stage .ja { font-size: 10px; }
    .lead h1 { font-size: 19px; }
    .lead p { font-size: 12px; }
  }

  /* ===== スマートフォン ===== */
  @media (max-width: 640px) {
    html, body { overflow-y: auto; height: auto; -webkit-overflow-scrolling: touch; }
    .frame {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 24px 16px 40px;
      height: auto; min-height: auto;
    }
    .lead h1 {
      font-size: 18px;
      line-height: 1.55;
      letter-spacing: 0.03em;
    }
    .lead p {
      font-size: 12px;
      line-height: 1.7;
      padding: 0 4px;
    }

    /* チェーン：折返しOK、コンパクト */
    .chain {
      gap: 6px;
      font-size: 11px;
      flex-wrap: wrap;
      padding: 4px;
    }
    .chain .bra {
      padding: 4px 6px;
      letter-spacing: 0.04em;
    }
    .chain .arrow {
      width: 16px; height: 16px;
      font-size: 10px;
    }

    /* 粒子エリアの高さを固定 */
    .stage-area {
      min-height: 240px;
      max-height: 280px;
      padding: 0;
    }
    .phase-caption {
      font-size: 9px;
      letter-spacing: 0.18em;
      padding-top: 12px;
      margin-bottom: 12px;
    }

    /* ステージカード：2カラムでスタック表示（モバイルでは矢印非表示） */
    .stages {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 8px;
    }
    .stage-arrow { display: none; }
    .stage {
      padding: 18px 10px;
      min-height: 86px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .stage .name { font-size: 14px; font-weight: 600; }
    .stage .ja { font-size: 10.5px; margin-top: 4px; }
    .stage::after {
      content: '› タップで詳細';
      opacity: 1;
      color: var(--navy);
      font-size: 9.5px;
      margin-top: 6px;
    }
    /* 5番目だけ全幅にする */
    .stage:nth-child(5) { grid-column: 1 / -1; }

    /* 詳細パネル：モーダルがあるので簡略化 */
    .detail { padding-top: 8px; }

    card.innerHTML = `
      <div class="sup-icon">${ICONS[item.icon] || ''}</div>
      <div class="sup-title">${item.t}</div>
      <div class="sup-desc">${item.d}</div>
    `;
    card.addEventListener('click', () => {
      card.classList.toggle('is-selected');
      updateEstimate(s);
    });
    sup.appendChild(card);
  });
  updateEstimate(s);
  // プランバッジ
  const planEl = document.getElementById('modalPlan');
  planEl.className = 'plan-badge' + (s.plan.isFree ? ' is-free' : '');
  planEl.innerHTML = `<span class="plan-label">${s.plan.label}</span><span class="plan-sub">${s.plan.sub}</span>`;
  // 期待される効果
  const out = document.getElementById('modalOutcomes');
  out.innerHTML = '';
  (s.outcomes || []).forEach(o => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="o-metric">${o.m}</span><span class="o-value">${o.v}</span>`;
    out.appendChild(li);
  });
  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}
function updateEstimate(stage) {
  const hint = document.getElementById('estimateHint');
  const result = document.getElementById('estimateResult');
  // Manual（無料フェーズ）の場合
  if (stage.plan && stage.plan.isFree) {
    hint.hidden = true;
    result.hidden = false;
    document.getElementById('estPrice').textContent = '無料';
    document.getElementById('estWeeks').textContent = '最大2週間';
    document.getElementById('estLead').textContent = stage.leadTime || '着手まで約1週間';
    return;
  }
  // 選択されたカードの集計
  const selected = Array.from(document.querySelectorAll('.sup-card.is-selected'));
  if (selected.length === 0) {
    hint.hidden = false;
    result.hidden = true;
    return;
  }
  let priceMin = 0, priceMax = 0, monthlyMin = 0, monthlyMax = 0;
  let weeksMin = 0, weeksMax = 0;
  selected.forEach(card => {
    const idx = +card.dataset.idx;
    const item = stage.support[idx];
    if (!item.price) return;
    if (item.monthly) {
      monthlyMin += item.price[0];
      monthlyMax += item.price[1];
    } else {
      priceMin += item.price[0];
      priceMax += item.price[1];
    }
    // 期間は最大ベース（並行作業前提で最長項目に揃える）
    if (item.weeks) {
      weeksMin = Math.max(weeksMin, item.weeks[0]);
      weeksMax = Math.max(weeksMax, item.weeks[1]);
    }
  });
  hint.hidden = true;
  result.hidden = false;
  // 費用表示
  let priceStr = '';
  if (priceMax > 0) priceStr = `¥${priceMin.toLocaleString()}〜${priceMax.toLocaleString()}万円`;
  if (monthlyMax > 0) {
    const monthlyStr = `¥${monthlyMin.toLocaleString()}〜${monthlyMax.toLocaleString()}万円/月`;
    priceStr = priceStr ? `${priceStr}<br><span style="font-size:.9em;color:var(--subt)">+ ${monthlyStr}</span>` : monthlyStr;
  }
  document.getElementById('estPrice').innerHTML = priceStr || '—';
  // 期間表示
  const weeksStr = weeksMin === weeksMax ? `約${weeksMin}週間` : `約${weeksMin}〜${weeksMax}週間`;
  document.getElementById('estWeeks').textContent = weeksStr;
  document.getElementById('estLead').textContent = stage.leadTime || '着手まで約3〜4週間';
}

function closeModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
modalBackdrop.addEventListener('click', (e) => { if (e.target === modalBackdrop) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

function renderDetail(i) {
  const s = STAGES[i];
  document.getElementById('detailBody').innerHTML = `
    <div class="detail-title fade-in">${s.name}<span style="color:var(--subt);font-weight:400;margin-left:10px;font-size:.85em;">— ${s.ja}</span></div>
    <p class="detail-text fade-in" style="animation-delay:.05s">${s.body}</p>
  `;
  document.getElementById('phaseCap').innerHTML = `Phase <b>${s.num} ／ ${s.name}</b>`;
}

/* ===== Ambient (vision-style drift) ===== */
(() => {
  const canvas = document.getElementById('ambient');
  const ctx = canvas.getContext('2d');
  const DPR = Math.min(window.devicePixelRatio || 1, 1.75);
  let W = 0, H = 0, ps = [];
  function rng(seed) {
    let a = seed >>> 0;
    return () => {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      let t = a;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  function init() {
    W = canvas.width  = Math.floor(window.innerWidth  * DPR);
    H = canvas.height = Math.floor(window.innerHeight * DPR);
    canvas.style.width  = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    const N = Math.round((window.innerWidth * window.innerHeight) / 35000);
    const r = rng(7); ps = [];
    for (let i = 0; i < N; i++) {
      ps.push({
        x: r() * W, y: r() * H,
        vx: (r() - 0.5) * 0.05 * DPR,
        vy: (r() - 0.5) * 0.05 * DPR,
        radius: (0.5 + r() * 0.7) * DPR,
        alpha: 0.10 + r() * 0.18
      });
    }
  }
  function tick() {
    ctx.clearRect(0, 0, W, H);
    for (const p of ps) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;
      if (p.y < -10) p.y = H + 10;
      if (p.y > H + 10) p.y = -10;
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = NAVY;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(tick);
  }
  window.addEventListener('resize', init);
  init(); tick();
})();

/* ===== Particle scene (the metaphor) ===== */
const scene = document.getElementById('scene');
const sctx = scene.getContext('2d');
let SW, SH, SDPR;
function srand(seed) {
  let a = seed >>> 0;
  return () => {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = a;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// 端末スペックに応じて粒子数を自動調整
const VW = window.innerWidth;
const IS_MOBILE = VW < 768;
const IS_TABLET = VW >= 768 && VW < 1100;
const CORES = navigator.hardwareConcurrency || 4;
const IS_LOW_END = CORES <= 4;

let N_PRIMARY, N_TOOL, TARGET_FPS;
if (IS_MOBILE) {
  N_PRIMARY = 65;  N_TOOL = 35;  TARGET_FPS = 30;
} else if (IS_TABLET) {
  N_PRIMARY = 100; N_TOOL = 55;  TARGET_FPS = 45;
} else if (IS_LOW_END) {
  N_PRIMARY = 110; N_TOOL = 60;  TARGET_FPS = 45;
} else {
  N_PRIMARY = 150; N_TOOL = 80;  TARGET_FPS = 60;
}
const FRAME_INTERVAL = 1000 / TARGET_FPS;
let primary = [];
let tools   = [];

function initParticles() {
  const r = srand(3);
  primary = [];
  for (let i = 0; i < N_PRIMARY; i++) {
    primary.push({
      x: r() * SW, y: r() * SH,
      vx: 0, vy: 0,
      baseR: 1.8 + r() * 2.8,
      // 既存サイトに合わせた青系バリエーション（明青〜淡青〜ネイビー）
      baseHue: 215 + (r() - 0.5) * 30,   // 200〜230 のブルー帯
      baseSat: 55 + r() * 35,             // 55〜90% 高彩度
      baseLight: 35 + r() * 35,           // 35〜70% 明るさ幅広
      phase: r() * Math.PI * 2,
      // 画面全体にバラまく固定ホーム座標（Manualで使用）
      homeX: r(), homeY: r(),
      // 揺らぎ強度（控えめ）
      wobbleAmp: 0.02 + r() * 0.035,
      wobbleSpd: 0.3 + r() * 0.5,
      slotAngle: 0
    });
  }
  for (let i = 0; i < primary.length; i++) {
    primary[i].slotAngle = (i / primary.length) * Math.PI * 2;
  }

  const r2 = srand(11);
  tools = [];
  for (let i = 0; i < N_TOOL; i++) {
    tools.push({
      x: SW + 20 + r2() * 80,
      y: r2() * SH,
      vx: 0, vy: 0,
      baseR: 1.4 + r2() * 1.8,
      hue: 215, sat: 50, light: 65,
      phase: r2() * Math.PI * 2,
      homeX: r2(), homeY: r2(),
      wobbleAmp: 0.02 + r2() * 0.035,
      wobbleSpd: 0.3 + r2() * 0.5,
      slotAngle: (i / N_TOOL) * Math.PI * 2 + Math.PI / N_TOOL
    });
  }
}

function resizeScene() {
  SDPR = Math.min(window.devicePixelRatio || 1, 2);
  const rect = scene.getBoundingClientRect();
  const w = Math.max(rect.width, 320);
  const h = Math.max(rect.height, 200);
  SW = scene.width  = Math.floor(w * SDPR);
  SH = scene.height = Math.floor(h * SDPR);
  if (primary.length === 0) initParticles();
}
window.addEventListener('resize', () => { resizeScene(); });
requestAnimationFrame(() => { resizeScene(); });

/* phase target state — each frame we ease toward this */
const phaseStates = {
  0: 'manual',
  1: 'standard',
  2: 'merge',
  3: 'ai',
  4: 'revops'
};
let currentPhase = phaseStates[active];
let blend = 1; // 1 = fully in currentPhase
let prevPhase = currentPhase;

function setPhase(i) {
  const next = phaseStates[i];
  if (next === currentPhase) return;
  prevPhase = currentPhase;
  currentPhase = next;
  blend = 0;
}

let t = 0;
let lastFrame = 0;
let isVisible = true;

// 画面外で停止（パフォーマンス節約）
if ('IntersectionObserver' in window) {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => { isVisible = e.isIntersecting; });
  }, { threshold: 0.01 });
  obs.observe(scene);
}
document.addEventListener('visibilitychange', () => {
  isVisible = !document.hidden;
});

function drawScene(now) {
  requestAnimationFrame(drawScene);
  if (!SW || !isVisible) return;
  if (now && now - lastFrame < FRAME_INTERVAL) return;
  lastFrame = now || 0;
  t += 1 / TARGET_FPS;
  // フェーズ遷移を約2倍速に
  blend = Math.min(1, blend + 0.028 * (60 / TARGET_FPS));

  sctx.clearRect(0, 0, SW, SH);

  // 粒子の活動領域 = canvas全体に最大限広げる
  const BOX_LEFT   = SW * 0.02;
  const BOX_RIGHT  = SW * 0.98;
  const BOX_TOP    = SH * 0.01;
  const BOX_BOTTOM = SH * 0.99;
  const boxW = BOX_RIGHT - BOX_LEFT;
  const boxH = BOX_BOTTOM - BOX_TOP;
  const cx = (BOX_LEFT + BOX_RIGHT) / 2;
  const cy = (BOX_TOP + BOX_BOTTOM) / 2;
  const R  = Math.min(boxW * 0.45, boxH * 0.45);

  // ----- targets per phase -----
  function targetFor(p, idx, phase, group) {
    // returns {tx, ty, tr, hue, light, alpha}
    if (group === 'primary') {
      if (phase === 'manual') {
        // ボックス内にバラまかれた固定ホーム + 各自の小さな揺らぎ
        // 揺らぎぶんのマージンを引いた安全領域にhomeを配置
        const margin = 0.10;
        const safeW = boxW * (1 - margin * 2);
        const safeH = boxH * (1 - margin * 2);
        const wobbleX = Math.sin(t * p.wobbleSpd + p.phase) * boxW * p.wobbleAmp;
        const wobbleY = Math.cos(t * p.wobbleSpd * 1.2 + p.phase * 1.5) * boxH * p.wobbleAmp;
        return {
          tx: BOX_LEFT + boxW * margin + p.homeX * safeW + wobbleX,
          ty: BOX_TOP  + boxH * margin + p.homeY * safeH + wobbleY,
          tr: p.baseR,
          hue: p.baseHue, sat: p.baseSat, light: p.baseLight, alpha: 0.78
        };
      }
      if (phase === 'standard') {
        const ang = p.slotAngle + t * 0.35;
        return {
          tx: cx + Math.cos(ang) * R * 0.85,
          ty: cy + Math.sin(ang) * R * 0.85,
          tr: p.baseR * 0.9,
          hue: p.baseHue, sat: p.baseSat * 0.85, light: 40, alpha: 0.9
        };
      }
      if (phase === 'merge') {
        const ang = p.slotAngle + t * 0.3;
        return {
          tx: cx + Math.cos(ang) * R * 0.55,
          ty: cy + Math.sin(ang) * R * 0.55,
          tr: p.baseR * 0.9,
          hue: 218, sat: 70, light: 35, alpha: 0.92
        };
      }
      if (phase === 'ai') {
        const ang = p.slotAngle + t * 0.5;
        const wobble = Math.sin(t * 1.6 + p.phase) * 8 * SDPR;
        return {
          tx: cx + Math.cos(ang) * (R * 0.62 + wobble),
          ty: cy + Math.sin(ang) * (R * 0.62 + wobble),
          tr: p.baseR * 0.85,
          hue: 220, sat: 75, light: 32, alpha: 0.94
        };
      }
      if (phase === 'revops') {
        const ang = p.slotAngle + t * 0.25;
        return {
          tx: cx + Math.cos(ang) * R * 1.0,
          ty: cy + Math.sin(ang) * R * 1.0,
          tr: p.baseR * 0.85 * 2,   // 各粒子が baseR × 1.7 倍に拡大
          hue: 220, sat: 80, light: 28, alpha: 1
        };
      }
    } else { // tools
      if (phase === 'manual' || phase === 'standard') {
        return {
          tx: SW + 30 + (idx * 7),
          ty: cy + (idx - N_TOOL / 2) * 4,
          tr: p.baseR, hue: 215, sat: 60, light: 65, alpha: 0
        };
      }
      if (phase === 'merge') {
        const ang = p.slotAngle + t * 0.3;
        return {
          tx: cx + Math.cos(ang) * R * 0.88,
          ty: cy + Math.sin(ang) * R * 0.88,
          tr: p.baseR * 1.05,
          hue: 210, sat: 70, light: 65, alpha: 0.9
        };
      }
      if (phase === 'ai') {
        const ang = p.slotAngle + t * 0.5 + Math.PI / N_TOOL;
        const wobble = Math.cos(t * 1.6 + p.phase) * 8 * SDPR;
        return {
          tx: cx + Math.cos(ang) * (R * 0.82 + wobble),
          ty: cy + Math.sin(ang) * (R * 0.82 + wobble),
          tr: p.baseR * 0.95,
          hue: 215, sat: 70, light: 50, alpha: 0.92
        };
      }
      if (phase === 'revops') {
        // toolsは各primaryスロットに重ねて吸着 → 一粒一粒が「人+AI+ツール」の融合体として大きく見える
        const slotIdx = idx % N_PRIMARY;
        const ang = (slotIdx / N_PRIMARY) * Math.PI * 2 + t * 0.25;
        return {
          tx: cx + Math.cos(ang) * R * 1.0,
          ty: cy + Math.sin(ang) * R * 1.0,
          tr: 3.6,
          hue: 210, sat: 75, light: 55, alpha: 0.85
        };
      }
    }
    return { tx: p.x, ty: p.y, tr: p.baseR, hue: 215, sat: 50, light: 40, alpha: 0.5 };
  }

  function lerp(a, b, k) { return a + (b - a) * k; }

  // draw connection lines for cohesive phases
  if (currentPhase !== 'manual') {
    const cohesion = (currentPhase === 'revops') ? 1
                  : (currentPhase === 'ai') ? 0.8
                  : (currentPhase === 'merge') ? 0.55
                  : 0.35;
    sctx.strokeStyle = `rgba(11,31,58,${0.06 * cohesion * blend})`;
    sctx.lineWidth = 1 * SDPR;
    const ringR = currentPhase === 'revops' ? R * 1.0
                : currentPhase === 'ai'     ? R * 0.85
                : currentPhase === 'merge'  ? R * 0.85
                : R * 0.85;
    sctx.beginPath();
    sctx.arc(cx, cy, ringR, 0, Math.PI * 2);
    sctx.stroke();
  }

  // update + draw primary
  function step(group, arr) {
    for (let i = 0; i < arr.length; i++) {
      const p = arr[i];
      const prev = targetFor(p, i, prevPhase, group);
      const cur  = targetFor(p, i, currentPhase, group);
      const tx = lerp(prev.tx, cur.tx, blend);
      const ty = lerp(prev.ty, cur.ty, blend);
      const tr = lerp(prev.tr, cur.tr, blend) * SDPR;
      const hue = lerp(prev.hue, cur.hue, blend);
      const sat = lerp(prev.sat || 50, cur.sat || 50, blend);
      const light = lerp(prev.light, cur.light, blend);
      const alpha = lerp(prev.alpha, cur.alpha, blend);

      // ease motion
      // 動きを速めて遷移を滑らかに
      p.x += (tx - p.x) * 0.15;
      p.y += (ty - p.y) * 0.15;

      sctx.globalAlpha = alpha;
      sctx.fillStyle = `hsl(${hue}, ${sat}%, ${light}%)`;
      sctx.beginPath();
      sctx.arc(p.x, p.y, tr, 0, Math.PI * 2);
      sctx.fill();
    }
  }

  step('primary', primary);
  step('tools', tools);

  // center glow in revops
  if (currentPhase === 'revops') {
    const grad = sctx.createRadialGradient(cx, cy, 0, cx, cy, R * 0.5);
    grad.addColorStop(0, `rgba(11,31,58,${0.18 * blend})`);
    grad.addColorStop(1, 'rgba(11,31,58,0)');
    sctx.fillStyle = grad;
    sctx.beginPath();
    sctx.arc(cx, cy, R * 0.5, 0, Math.PI * 2);
    sctx.fill();
  }

  sctx.globalAlpha = 1;
}
requestAnimationFrame(drawScene);

/* init */
renderDetail(active);
</script>
</body>
